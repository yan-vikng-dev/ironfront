name: user-service

on:
  push:
    branches: [main]
    paths: [user-service/**]

env:
  REGION: europe-west1
  IMAGE: europe-west1-docker.pkg.dev/ironfront-game/ironfront/user-service
  SERVICE: user-service-prod
  WIF_PROVIDER: projects/556532261549/locations/global/workloadIdentityPools/github-actions/providers/github-oidc
  WIF_SERVICE_ACCOUNT: ironfront-ci@ironfront-game.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: docker/login-action@v3
        with:
          registry: europe-west1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - id: meta
        run: echo "tag=${GITHUB_SHA::7}-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: user-service
          push: true
          platforms: linux/amd64
          provenance: false
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          image: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          region: ${{ env.REGION }}
